<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Aravind Bramhajosyula</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/bitmaks/cm-web-fonts@latest/fonts.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="page-container">
        <h1 class="page-title">Contact Me</h1>
        <p class="page-subtitle">I am happy to hear from anyone with questions about my writing, potential collaborations, or anything else. Fill in the form below and I will get back to you.</p>

        <form action="#" method="POST" class="contact-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="joe@example.com" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" class="form-control" placeholder="Write your message here." required></textarea>
            </div>

            <button type="submit" class="submit-btn">
                Send
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
            <p class="form-disclaimer">Your message will be delivered directly to my inbox. I aim to reply within a few days.</p>
        </form>
    </main>

    <div id="footer-placeholder"></div>

    <script src="components.js"></script>
    <script src="script.js"></script>
</body>
</html>
