    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const mdFile = urlParams.get('file');

            if (!mdFile) {
                document.getElementById('markdown-content').innerHTML = `<p>No article specified in URL.</p>`;
                return;
            }

            try {
                // 1. Fetch and render the markdown content
                const mdResponse = await fetch(mdFile);
                if (!mdResponse.ok) throw new Error("File not found");
                const text = await mdResponse.text();
                
                // Calculate actual word count and read time
                const wordCount = text.trim().split(/\s+/).length;
                const readTime = Math.max(1, Math.ceil(wordCount / 200));

                // Render markdown
                document.getElementById('markdown-content').innerHTML = marked.parse(text);

                // 2. Fetch the index.json to update Title, Meta, and Navigation
                // This dynamically finds the correct folder (e.g., 'blog') from the file path
                const folderIndex = mdFile.lastIndexOf('/');
                const folderPath = folderIndex !== -1 ? mdFile.substring(0, folderIndex) : '';
                const indexUrl = folderPath ? `${folderPath}/index.json` : 'index.json';
                
                const indexResponse = await fetch(indexUrl);
                if (indexResponse.ok) {
                    let posts = await indexResponse.json();
                    
                    // Ensure the JSON is sorted newest-to-oldest for navigation logic
                    posts.sort((a, b) => new Date(b.date) - new Date(a.date));

                    // Find where the current article sits in the timeline
                    const currentIndex = posts.findIndex(p => p.file === mdFile);

                    if (currentIndex !== -1) {
                        const currentPost = posts[currentIndex];
                        const dateObj = new Date(currentPost.date);
                        const formattedDate = dateObj.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

                        // Update Page Title and Document Title
                        document.getElementById('post-title').textContent = currentPost.title;
                        document.title = `${currentPost.title} - Aravind Bramhajosyula`;

                        // Inject the dynamically calculated Meta stats
                        document.getElementById('post-meta').innerHTML = `
                            <span>${formattedDate}</span> <span class="dot-separator">•</span>
                            <span>${wordCount} words</span> <span class="dot-separator">•</span>
                            <span>${readTime} mins</span>
                        `;

                        // 3. Wire up the Navigation Buttons
                        const prevNav = document.getElementById('prev-article');
                        const nextNav = document.getElementById('next-article');

                        // Previous Article (Older -> further down the array)
                        if (currentIndex < posts.length - 1) {
                            const prevPost = posts[currentIndex + 1];
                            prevNav.style.display = 'flex';
                            prevNav.href = `article.html?file=${prevPost.file}`;
                            prevNav.querySelector('.nav-title').textContent = prevPost.title;
                            prevNav.querySelector('.nav-date').textContent = new Date(prevPost.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
                        } else {
                            prevNav.style.display = 'none'; // Hide if there is no older article
                        }

                        // Next Article (Newer -> further up the array)
                        if (currentIndex > 0) {
                            const nextPost = posts[currentIndex - 1];
                            nextNav.style.display = 'flex';
                            nextNav.href = `article.html?file=${nextPost.file}`;
                            nextNav.querySelector('.nav-title').textContent = nextPost.title;
                            nextNav.querySelector('.nav-date').textContent = new Date(nextPost.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
                        } else {
                            nextNav.style.display = 'none'; // Hide if this is the most recent article
                        }
                    }
                }
            } catch (error) {
                document.getElementById('markdown-content').innerHTML = `<p>Error loading article: ${error.message}</p>`;
            }
        });
    </script>
